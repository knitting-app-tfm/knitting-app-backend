services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/knitting
      - SECRET_KEY=supersecretkey
      - RAVELRY_CLIENT_ID=tuclientid
    depends_on:
      - db

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=knitting
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: